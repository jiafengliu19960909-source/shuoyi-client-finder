<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>烁翌国际客户搜寻 App</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <svg class="svg-sprite" aria-hidden="true">
      <symbol id="icon-search" viewBox="0 0 24 24">
        <path d="m21 21-4.3-4.3" />
        <circle cx="11" cy="11" r="7" />
      </symbol>
      <symbol id="icon-star" viewBox="0 0 24 24">
        <path d="m12 3 2.7 5.5 6.1.9-4.4 4.2 1 6-5.4-2.9-5.4 2.9 1-6-4.4-4.2 6.1-.9L12 3z" />
      </symbol>
      <symbol id="icon-filter" viewBox="0 0 24 24">
        <path d="M3 5h18M6 12h12M10 19h4" />
      </symbol>
      <symbol id="icon-download" viewBox="0 0 24 24">
        <path d="M12 3v12m0 0 4-4m-4 4-4-4M4 21h16" />
      </symbol>
      <symbol id="icon-reset" viewBox="0 0 24 24">
        <path d="M3 12a9 9 0 1 0 3-6.7M3 4v6h6" />
      </symbol>
      <symbol id="icon-copy" viewBox="0 0 24 24">
        <path d="M8 8h10v12H8z" />
        <path d="M6 16H4V4h10v2" />
      </symbol>
      <symbol id="icon-eye" viewBox="0 0 24 24">
        <path d="M2 12s3.8-7 10-7 10 7 10 7-3.8 7-10 7S2 12 2 12z" />
        <circle cx="12" cy="12" r="3" />
      </symbol>
      <symbol id="icon-close" viewBox="0 0 24 24">
        <path d="M18 6 6 18M6 6l12 12" />
      </symbol>
    </svg>

    <div class="app-shell">
      <header class="topbar">
        <div class="brand-lockup">
          <img class="brand-logo" src="./assets/logo.png" alt="烁翌国际咨询" />
          <div>
            <p class="eyebrow">Lumiere International Consulting</p>
            <h1>烁翌国际客户搜寻 App</h1>
          </div>
        </div>
        <div class="network-mode">
          <span></span>
          <strong>Network-ready</strong>
        </div>
        <div class="top-actions" aria-label="App actions">
          <button class="icon-button" id="exportBtn" type="button" title="导出当前结果">
            <svg><use href="#icon-download"></use></svg>
          </button>
          <button class="icon-button" id="resetBtn" type="button" title="重置筛选">
            <svg><use href="#icon-reset"></use></svg>
          </button>
        </div>
      </header>

      <main class="workspace">
        <aside class="filter-panel" aria-label="客户筛选">
          <div class="panel-title">
            <svg><use href="#icon-filter"></use></svg>
            <span>筛选条件</span>
          </div>

          <label class="field search-field">
            <span>关键词</span>
            <div class="search-input">
              <svg><use href="#icon-search"></use></svg>
              <input id="keywordInput" type="search" placeholder="公司名、国家、产品、地区" autocomplete="off" />
            </div>
          </label>

          <label class="field">
            <span>客户所在国家</span>
            <select id="countrySelect"></select>
          </label>

          <label class="field">
            <span>客户所在地区</span>
            <select id="regionSelect"></select>
          </label>

          <label class="field">
            <span>外贸销售目的地</span>
            <select id="marketSelect"></select>
          </label>

          <label class="field">
            <span>产品方向</span>
            <select id="productSelect"></select>
          </label>

          <div class="field">
            <span>客户类型</span>
            <div class="segmented" id="typeTabs" role="tablist" aria-label="客户类型"></div>
          </div>

          <label class="toggle-row">
            <input id="favoritesOnly" type="checkbox" />
            <span>只看收藏客户</span>
          </label>
        </aside>

        <section class="results-area">
          <section class="overview-band">
            <div class="metric">
              <span id="resultCount">0</span>
              <p>匹配客户</p>
            </div>
            <div class="metric">
              <span id="countryCount">0</span>
              <p>覆盖国家</p>
            </div>
            <div class="metric">
              <span id="favoriteCount">0</span>
              <p>已收藏</p>
            </div>
            <div class="metric">
              <span id="networkCount">0</span>
              <p>网络入口</p>
            </div>
          </section>

          <section class="advisor-panel">
            <div>
              <p class="eyebrow">Student Search Pack</p>
              <h2>按国家、地区、产品方向快速锁定客户</h2>
            </div>
            <div id="queryPills" class="query-pills" aria-label="搜索建议"></div>
          </section>

          <div class="result-toolbar">
            <div>
              <p id="resultSummary">正在准备客户列表</p>
              <small id="activeFilters"></small>
            </div>
            <div class="view-switch" aria-label="显示方式">
              <button class="view-button active" type="button" data-view="cards">卡片</button>
              <button class="view-button" type="button" data-view="table">表格</button>
            </div>
          </div>

          <div id="results" class="results-grid"></div>
          <div id="emptyState" class="empty-state" hidden>
            <div class="empty-illustration" aria-hidden="true">
              <svg viewBox="0 0 220 150">
                <rect x="28" y="24" width="164" height="102" rx="8"></rect>
                <path d="M52 52h78M52 76h112M52 100h54"></path>
                <circle cx="160" cy="88" r="20"></circle>
                <path d="m175 103 20 20"></path>
              </svg>
            </div>
            <h3>没有匹配结果</h3>
            <p>换一个国家、地区或产品关键词试试。</p>
          </div>
        </section>

        <aside class="detail-panel" id="detailPanel" aria-label="客户详情">
          <button class="close-detail" id="closeDetailBtn" type="button" title="关闭详情">
            <svg><use href="#icon-close"></use></svg>
          </button>
          <div id="detailContent" class="detail-content"></div>
        </aside>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
