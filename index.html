<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>烁翌国际客户搜寻 App</title>
    <style>
:root {
  --ink: #f3ecd9;
  --muted: #a99f8d;
  --line: #332b1d;
  --panel: #111317;
  --soft: #191711;
  --brand: #d8b96f;
  --brand-strong: #f3d99a;
  --accent: #b98a42;
  --green: #2c9a78;
  --red: #d0715f;
  --shadow: 0 20px 56px rgba(0, 0, 0, 0.35);
  --radius: 8px;
}

* {
  box-sizing: border-box;
}

html {
  min-width: 320px;
  background: #08090b;
  overflow-x: hidden;
}

body {
  margin: 0;
  color: var(--ink);
  font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", Arial, sans-serif;
  letter-spacing: 0;
  overflow-x: hidden;
}

button,
input,
select,
textarea {
  font: inherit;
}

button {
  cursor: pointer;
}

.svg-sprite {
  display: none;
}

.app-shell {
  min-height: 100vh;
  background:
    linear-gradient(180deg, rgba(11, 95, 107, 0.08), rgba(184, 135, 70, 0.05) 42%, rgba(244, 246, 248, 0)),
    #f4f6f8;
}

.topbar {
  position: sticky;
  top: 0;
  z-index: 20;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
  padding: 14px 28px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.7);
  background: rgba(250, 251, 252, 0.92);
  backdrop-filter: blur(18px);
}

.brand-lockup {
  display: flex;
  align-items: center;
  flex: 1 1 auto;
  min-width: 0;
  gap: 14px;
}

.brand-logo {
  width: 56px;
  height: 56px;
  object-fit: contain;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: #fff;
  box-shadow: 0 10px 24px rgba(17, 24, 39, 0.08);
}

.eyebrow {
  margin: 0 0 3px;
  color: var(--brand);
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
}

h1,
h2,
h3,
p {
  margin-top: 0;
}

h1 {
  margin-bottom: 0;
  font-size: 24px;
  line-height: 1.25;
  font-weight: 850;
}

h2 {
  margin-bottom: 0;
  font-size: 20px;
  line-height: 1.35;
}

.top-actions {
  display: flex;
  flex: 0 0 auto;
  gap: 8px;
}

.network-mode {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  min-height: 36px;
  margin-left: auto;
  padding: 0 12px;
  border: 1px solid #d2c3ad;
  border-radius: var(--radius);
  color: #5a3d18;
  background: #fffaf1;
  font-size: 13px;
}

.network-mode span {
  width: 8px;
  height: 8px;
  border-radius: 999px;
  background: var(--green);
}

.icon-button,
.close-detail {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 40px;
  height: 40px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  color: var(--brand-strong);
  background: #fff;
}

svg {
  width: 18px;
  height: 18px;
  stroke: currentColor;
  stroke-width: 2;
  fill: none;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.workspace {
  display: grid;
  grid-template-columns: 300px minmax(0, 1fr) 360px;
  gap: 18px;
  width: min(1640px, 100%);
  margin: 0 auto;
  padding: 18px;
}

.filter-panel,
.detail-panel {
  align-self: start;
  border: 1px solid rgba(217, 222, 231, 0.86);
  border-radius: var(--radius);
  background: rgba(255, 255, 255, 0.94);
  box-shadow: var(--shadow);
}

.filter-panel {
  position: sticky;
  top: 92px;
  padding: 18px;
}

.panel-title {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 18px;
  font-weight: 800;
}

.field {
  display: grid;
  gap: 7px;
  margin-bottom: 14px;
}

.field > span,
.toggle-row span {
  color: #2b3445;
  font-size: 13px;
  font-weight: 700;
}

.search-input {
  display: grid;
  grid-template-columns: 20px 1fr;
  align-items: center;
  gap: 8px;
  padding: 0 12px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: #fff;
}

.search-input svg {
  color: var(--muted);
}

input,
select,
textarea {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: #fff;
  color: var(--ink);
}

input,
select {
  min-height: 42px;
  padding: 0 12px;
}

.search-input input {
  border: 0;
  padding: 0;
  outline: 0;
}

textarea {
  min-height: 96px;
  padding: 10px 12px;
  resize: vertical;
}

.segmented {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 8px;
}

.segment-button,
.view-button {
  min-height: 38px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: #fff;
  color: var(--muted);
  font-weight: 700;
}

.segment-button.active,
.view-button.active {
  border-color: var(--brand);
  color: #fff;
  background: var(--brand);
}

.toggle-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 8px 0 20px;
}

.toggle-row input {
  width: 18px;
  min-height: 18px;
  accent-color: var(--brand);
}

.results-area {
  display: grid;
  align-content: start;
  gap: 14px;
  min-width: 0;
}

.overview-band,
.advisor-panel,
.result-toolbar {
  border: 1px solid rgba(217, 222, 231, 0.9);
  border-radius: var(--radius);
  background: rgba(255, 255, 255, 0.95);
  box-shadow: var(--shadow);
}

.overview-band {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 1px;
  overflow: hidden;
  background: var(--line);
}

.metric {
  padding: 18px 14px;
  background: #fff;
}

.metric span {
  display: block;
  color: var(--brand-strong);
  font-size: 26px;
  font-weight: 900;
}

.metric p {
  margin: 4px 0 0;
  color: var(--muted);
  font-size: 13px;
}

.advisor-panel {
  display: grid;
  grid-template-columns: minmax(220px, 0.9fr) minmax(280px, 1.5fr);
  gap: 18px;
  align-items: center;
  padding: 18px;
}

.query-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.query-pill {
  display: inline-flex;
  align-items: center;
  max-width: 100%;
  gap: 6px;
  padding: 8px 10px;
  border: 1px solid #bfd9dc;
  border-radius: var(--radius);
  color: var(--brand-strong);
  background: #f3faf9;
  font-size: 13px;
  font-weight: 700;
}

.query-pill svg {
  flex: 0 0 auto;
}

.result-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 14px 16px;
}

.result-toolbar p {
  margin-bottom: 2px;
  font-weight: 800;
}

.result-toolbar small {
  color: var(--muted);
}

.view-switch {
  display: flex;
  gap: 8px;
}

.view-button {
  min-width: 64px;
}

.results-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 14px;
}

.customer-card {
  display: grid;
  gap: 12px;
  min-height: 238px;
  padding: 16px;
  border: 1px solid rgba(217, 222, 231, 0.9);
  border-radius: var(--radius);
  background: #fff;
  box-shadow: 0 14px 30px rgba(17, 24, 39, 0.08);
}

.card-head {
  display: flex;
  justify-content: space-between;
  gap: 12px;
}

.customer-card h3 {
  margin-bottom: 6px;
  font-size: 16px;
  line-height: 1.35;
}

.badge-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.badge {
  display: inline-flex;
  align-items: center;
  min-height: 24px;
  max-width: 100%;
  padding: 3px 8px;
  border-radius: 999px;
  background: var(--soft);
  color: #3c4658;
  font-size: 12px;
  font-weight: 700;
}

.badge.brand {
  color: #fff;
  background: var(--brand);
}

.badge.green {
  color: #fff;
  background: var(--green);
}

.badge.gold {
  color: #513a17;
  background: #f1dfbf;
}

.card-meta {
  display: grid;
  gap: 7px;
  color: var(--muted);
  font-size: 13px;
}

.meta-line {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  border-bottom: 1px dashed #e6ebf1;
  padding-bottom: 7px;
}

.meta-line strong {
  color: var(--ink);
  text-align: right;
}

.card-actions {
  display: flex;
  gap: 8px;
  margin-top: auto;
}

.card-actions .text-button {
  flex: 1 1 0;
  min-width: 0;
}

.text-button span {
  white-space: nowrap;
}

.text-button {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  min-height: 38px;
  padding: 0 12px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  color: var(--brand-strong);
  background: #fff;
  font-weight: 800;
  text-decoration: none;
}

.text-button.primary {
  border-color: var(--brand);
  color: #fff;
  background: var(--brand);
}

.favorite-button.active {
  border-color: var(--accent);
  color: #3b2a10;
  background: #f6d499;
}

.table-wrap {
  overflow: auto;
  border: 1px solid rgba(255, 255, 255, 0.75);
  border-radius: var(--radius);
  background: #fff;
  box-shadow: var(--shadow);
}

table {
  width: 100%;
  min-width: 820px;
  border-collapse: collapse;
  font-size: 14px;
}

th,
td {
  padding: 12px 14px;
  border-bottom: 1px solid var(--line);
  text-align: left;
  vertical-align: top;
}

th {
  color: #2b3445;
  background: #f8fafc;
  font-size: 13px;
}

.detail-panel {
  position: sticky;
  top: 92px;
  overflow: hidden;
  min-height: 560px;
}

.close-detail {
  position: absolute;
  top: 12px;
  right: 12px;
  z-index: 3;
}

.detail-content {
  padding: 22px;
}

.detail-empty {
  display: grid;
  gap: 16px;
}

.detail-visual {
  position: relative;
  overflow: hidden;
  min-height: 210px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background:
    linear-gradient(135deg, rgba(18, 49, 58, 0.96), rgba(11, 95, 107, 0.9)),
    #12313a;
}

.detail-visual::before {
  content: "";
  display: block;
  width: calc(100% - 44px);
  height: 150px;
  margin: 30px 22px;
  border: 1px solid rgba(255, 255, 255, 0.24);
  border-radius: var(--radius);
  background:
    linear-gradient(90deg, rgba(255, 255, 255, 0.1) 1px, transparent 1px) 0 0 / 36px 36px,
    linear-gradient(0deg, rgba(255, 255, 255, 0.1) 1px, transparent 1px) 0 0 / 36px 36px;
}

.detail-visual::after {
  content: "GLOBAL CLIENT INTELLIGENCE";
  position: absolute;
  left: 42px;
  bottom: 34px;
  color: rgba(255, 255, 255, 0.78);
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 0.12em;
}

.detail-empty-copy {
  padding: 4px 0 2px;
}

.detail-empty h3 {
  margin-bottom: 6px;
  font-size: 20px;
}

.detail-empty p,
.network-note {
  color: var(--muted);
  line-height: 1.7;
}

.detail-title {
  margin-right: 44px;
}

.detail-title h3 {
  margin-bottom: 8px;
  font-size: 22px;
  line-height: 1.3;
}

.detail-section {
  margin-top: 18px;
  padding-top: 18px;
  border-top: 1px solid var(--line);
}

.detail-section h4 {
  margin: 0 0 10px;
  font-size: 14px;
}

.detail-grid {
  display: grid;
  gap: 8px;
}

.detail-grid div {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  color: var(--muted);
}

.detail-grid strong {
  color: var(--ink);
  text-align: right;
}

.copy-list {
  display: grid;
  gap: 8px;
}

.copy-item {
  display: grid;
  grid-template-columns: 1fr 38px;
  gap: 8px;
  align-items: center;
}

.copy-item code {
  overflow: hidden;
  padding: 10px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: #f8fafc;
  color: #2b3445;
  font-family: Consolas, "Courier New", monospace;
  font-size: 12px;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.network-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.network-card {
  display: grid;
  gap: 5px;
  min-height: 76px;
  padding: 11px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  color: var(--ink);
  background: #fff;
  text-decoration: none;
}

.network-card strong {
  font-size: 13px;
}

.network-card span {
  color: var(--muted);
  font-size: 12px;
  line-height: 1.45;
}

.network-card:hover,
.text-button:hover,
.icon-button:hover {
  border-color: var(--brand);
}

.finance-panel {
  display: grid;
  gap: 10px;
  padding: 12px;
  border: 1px solid #bdd5df;
  border-radius: var(--radius);
  background: #f3fbfd;
}

.finance-panel strong {
  color: var(--brand-strong);
}

.link-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.empty-state {
  display: grid;
  justify-items: center;
  gap: 10px;
  padding: 42px 18px;
  border: 1px solid rgba(255, 255, 255, 0.75);
  border-radius: var(--radius);
  background: #fff;
  text-align: center;
  box-shadow: var(--shadow);
}

.empty-illustration {
  display: grid;
  place-items: center;
  width: 132px;
  height: 94px;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: #f8fafc;
}

.empty-illustration svg {
  width: 112px;
  height: 76px;
  color: var(--brand-strong);
}

.empty-illustration rect,
.empty-illustration path,
.empty-illustration circle {
  fill: none;
  stroke: currentColor;
  stroke-width: 5;
  stroke-linecap: round;
  stroke-linejoin: round;
}

.empty-state h3 {
  margin-bottom: 0;
}

.empty-state p {
  margin-bottom: 0;
  color: var(--muted);
}

.toast {
  position: fixed;
  right: 20px;
  bottom: 20px;
  z-index: 80;
  max-width: min(360px, calc(100vw - 40px));
  padding: 12px 14px;
  border-radius: var(--radius);
  color: #fff;
  background: var(--brand-strong);
  box-shadow: var(--shadow);
}

.app-shell {
  background:
    linear-gradient(180deg, rgba(216, 185, 111, 0.08), rgba(8, 9, 11, 0) 38%),
    linear-gradient(135deg, #08090b 0%, #101217 48%, #08090b 100%);
}

.topbar {
  border-bottom: 1px solid rgba(216, 185, 111, 0.22);
  background: rgba(8, 9, 11, 0.9);
}

.brand-logo {
  border-color: rgba(216, 185, 111, 0.44);
  background: #15120d;
  box-shadow: 0 12px 30px rgba(216, 185, 111, 0.12);
}

.brand-mark {
  display: grid;
  place-items: center;
  color: #090a0c;
  background: linear-gradient(135deg, #f7e3ad, #c19143 64%, #8a642e);
  font-size: 18px;
  font-weight: 900;
}

.eyebrow,
.panel-title,
.metric span,
.finance-panel strong {
  color: var(--brand-strong);
}

h1,
h2,
h3,
.result-toolbar p,
.customer-card h3,
.detail-section h4 {
  color: var(--ink);
}

.network-mode {
  border-color: rgba(216, 185, 111, 0.36);
  color: var(--brand-strong);
  background: rgba(216, 185, 111, 0.08);
}

.filter-panel,
.detail-panel,
.overview-band,
.advisor-panel,
.result-toolbar,
.customer-card,
.table-wrap,
.empty-state {
  border-color: rgba(216, 185, 111, 0.22);
  background: rgba(17, 19, 23, 0.94);
  box-shadow: var(--shadow);
}

.overview-band {
  background: rgba(216, 185, 111, 0.18);
}

.metric {
  background: rgba(17, 19, 23, 0.98);
}

.metric p,
.result-toolbar small,
.field > span,
.toggle-row span,
.card-meta,
.detail-empty p,
.network-note,
.network-card span,
.source-row span {
  color: var(--muted);
}

input,
select,
textarea,
.search-input,
.segment-button,
.view-button,
.icon-button,
.close-detail,
.text-button,
.query-pill,
.copy-item code {
  border-color: rgba(216, 185, 111, 0.22);
  color: var(--ink);
  background: rgba(8, 9, 11, 0.68);
}

.search-input input {
  background: transparent;
}

input::placeholder,
textarea::placeholder {
  color: #756d5f;
}

.segment-button,
.view-button {
  color: var(--muted);
}

.segment-button.active,
.view-button.active,
.text-button.primary {
  border-color: #e3c37a;
  color: #090a0c;
  background: linear-gradient(135deg, #f0d48d, #b98a42);
}

.text-button,
.icon-button,
.close-detail,
.query-pill {
  color: var(--brand-strong);
}

.query-pill {
  background: rgba(216, 185, 111, 0.09);
}

.badge {
  color: #d7cbb7;
  background: rgba(255, 255, 255, 0.07);
}

.badge.brand {
  color: #090a0c;
  background: var(--brand);
}

.badge.green {
  color: #06110d;
  background: #55c89f;
}

.badge.gold,
.favorite-button.active {
  color: #090a0c;
  background: #dfbd72;
}

.meta-line {
  border-bottom-color: rgba(216, 185, 111, 0.16);
}

.meta-line strong,
.detail-grid strong,
.network-card,
.source-row strong {
  color: var(--ink);
}

th,
.copy-item code,
.empty-illustration {
  background: rgba(216, 185, 111, 0.07);
}

th,
td {
  border-bottom-color: rgba(216, 185, 111, 0.15);
}

th {
  color: var(--brand-strong);
}

.detail-visual {
  border-color: rgba(216, 185, 111, 0.32);
  background:
    linear-gradient(135deg, rgba(216, 185, 111, 0.18), rgba(17, 19, 23, 0.98)),
    #0e1014;
}

.detail-visual::before {
  border-color: rgba(216, 185, 111, 0.28);
  background:
    linear-gradient(90deg, rgba(216, 185, 111, 0.12) 1px, transparent 1px) 0 0 / 36px 36px,
    linear-gradient(0deg, rgba(216, 185, 111, 0.12) 1px, transparent 1px) 0 0 / 36px 36px;
}

.detail-visual::after {
  color: rgba(243, 217, 154, 0.8);
}

.detail-section {
  border-top-color: rgba(216, 185, 111, 0.16);
}

.network-card,
.finance-panel,
.source-row {
  border-color: rgba(216, 185, 111, 0.18);
  background: rgba(8, 9, 11, 0.52);
}

.source-grid {
  display: grid;
  gap: 8px;
}

.source-row {
  display: grid;
  gap: 5px;
  padding: 10px;
  border: 1px solid rgba(216, 185, 111, 0.18);
  border-radius: var(--radius);
}

.source-row strong {
  overflow-wrap: anywhere;
  line-height: 1.55;
}

.empty-illustration {
  border-color: rgba(216, 185, 111, 0.22);
}

.empty-illustration svg {
  color: var(--brand-strong);
}

.network-card:hover,
.text-button:hover,
.icon-button:hover {
  border-color: var(--brand);
  box-shadow: 0 0 0 2px rgba(216, 185, 111, 0.08);
}

.toast {
  color: #090a0c;
  background: var(--brand);
}

@media (max-width: 1320px) {
  .workspace {
    grid-template-columns: 280px minmax(0, 1fr);
  }

  .detail-panel {
    position: fixed;
    top: 78px;
    right: 18px;
    bottom: 18px;
    z-index: 30;
    display: none;
    width: min(420px, calc(100vw - 36px));
    transform: none;
  }

  .detail-panel.open {
    display: block;
  }
}

@media (max-width: 980px) {
  .topbar {
    padding: 12px 16px;
  }

  .network-mode {
    display: none;
  }

  h1 {
    font-size: 20px;
  }

  .workspace {
    grid-template-columns: 1fr;
    padding: 14px;
  }

  .filter-panel {
    position: static;
  }

  .advisor-panel {
    grid-template-columns: 1fr;
  }

  .results-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
}

function enrichLead([name, country, source], index) {
  const region = regionByCountry[country] || "其他地区";
  const product = inferProduct(name);
  const type = inferType(name);
  const intent = inferIntent(type, product);
  const score = scoreLead(country, product, type, index);

  const lead = {
    id: `lead-${index + 1}`,
    name,
    country,
    region,
    market: marketByRegion[region] || `${region}目标市场`,
    product,
    type,
    intent,
    score,
    source,
    ticker: tickerHints[name] || ""
  };
  lead.links = buildNetworkLinks(lead);
  return lead;
}

function enrichCardLead(item, index) {
  const country = item.country || "未知国家";
  const region = regionByCountry[country] || "其他地区";
  const product = item.industryGroup || item.industry || "名片客户";
  const type = inferCardType(item);
  const score = scoreCardLead(item, index);
  const contactName = item.contact || "";
  const industryGroup = item.industryGroup || "名片信息";

  const lead = {
    id: item.id || `card-${index + 1}`,
    name: item.company || "未命名公司",
    country,
    region,
    market: marketByRegion[region] || `${region}目标市场`,
    product,
    type,
    intent: inferCardIntent(item, type),
    score,
    source: item.source || "名片信息",
    ticker: tickerHints[item.company] || "",
    contactName,
    position: item.position || "",
    contactInfo: item.contactInfo || "",
    website: item.web || "",
    address: item.address || "",
    industryGroup,
    cardIndustry: item.industry || ""
  };
  lead.links = buildNetworkLinks(lead);
  return lead;
}

function buildNetworkLinks(customer) {
  const company = encodeURIComponent(customer.name);
  const country = encodeURIComponent(customer.country);
  const product = encodeURIComponent(customer.product);
  const ticker = encodeURIComponent(customer.ticker || customer.name);
  const directWebsite = extractFirstUrl(customer.website);

  return {
    official: directWebsite || `https://www.google.com/search?q=${company}+official+website+contact`,
    linkedin: `https://www.linkedin.com/search/results/companies/?keywords=${company}`,
    finance: customer.ticker
      ? `https://finance.yahoo.com/quote/${ticker}`
      : `https://finance.yahoo.com/lookup?s=${company}`,
    reports: `https://www.annualreports.com/SearchResults?query=${company}`,
    sec: `https://www.sec.gov/edgar/search/#/q=${company}`,
    news: `https://www.google.com/search?tbm=nws&q=${company}+${country}+${product}`,
    import: `https://www.google.com/search?q=${country}+${product}+importer+distributor+buyer+email`,
    investor: `https://www.google.com/search?q=${company}+investor+relations+annual+report+financial+statements`,
    websiteContact: `https://www.google.com/search?q=${company}+contact+email+sales+${country}`
  };
}

function inferCardType(item) {
  const text = `${item.company || ""} ${item.industry || ""} ${item.position || ""}`.toLowerCase();
  if (/贸易|物流|供应|经销|代理|分销|depot|supply|trading|sales|marketing|distributor/.test(text)) return "经销/贸易商";
  if (/工程|建筑|机电|系统|运维|服务|技术|engineer|project|service|solution/.test(text)) return "服务/技术";
  return "名片客户";
}

function inferCardIntent(item, type) {
  const contact = item.contact ? `联系 ${item.contact}` : "联系名片联系人";
  if (type === "经销/贸易商") return `${contact}，确认代理、分销、进口采购和本地渠道合作机会`;
  if (type === "服务/技术") return `${contact}，确认项目采购、工程配套、技术服务和设备合作机会`;
  return `${contact}，核实采购角色、品类需求和后续开发邮件`;
}

function scoreCardLead(item, index) {
  let score = 70 + ((index * 5) % 22);
  if (item.contactInfo) score += 5;
  if (item.web) score += 4;
  if (item.address) score += 2;
  return Math.min(score, 98);
}

function extractFirstUrl(value) {
  const text = String(value || "");
  const match = text.match(/https?:\/\/[^\s,，；;]+|(?:www\.)?[a-z0-9-]+(?:\.[a-z0-9-]+)+[^\s,，；;]*/i);
  if (!match) return "";
  const url = match[0].replace(/[)）.]$/, "");
  return /^https?:\/\//i.test(url) ? url : `https://${url}`;
}

function decodeCardRows() {
  const fields = window.SHUOYI_CARD_FIELDS;
  const rows = window.SHUOYI_CARD_ROWS;
  if (!Array.isArray(fields) || !Array.isArray(rows)) return [];
  return rows.map((row) => Object.fromEntries(fields.map((field, index) => [field, row[index] || ""])));
}

function inferProduct(name) {
  const text = name.toLowerCase();
  if (text.includes("orthodont") || text.includes("aligner")) return "正畸与矫治";
  if (text.includes("dental") || text.includes("denta") || text.includes("oral") || text.includes("odonto")) return "牙科耗材与设备";
  if (text.includes("medical") || text.includes("healthcare") || text.includes("biomed") || text.includes("laborator")) return "医疗器械与耗材";
  if (text.includes("technology") || text.includes("sifary") || text.includes("zeiss") || text.includes("optik")) return "技术设备与软件";
  if (text.includes("trade") || text.includes("supply") || text.includes("asia pacific")) return "渠道贸易与分销";
  if (text.includes("education") || text.includes("tribune") || text.includes("2026")) return "展会教育与媒体";
  return "综合口腔医疗";
}

function inferType(name) {
  const text = name.toLowerCase();
  if (text.includes("association") || text.includes("tribune")) return "行业协会/媒体";
  if (text.includes("education") || text.includes("2026")) return "教育/展会";
  if (text.includes("trade") || text.includes("supply") || text.includes("service") || text.includes("enterprises")) return "经销/贸易商";
  if (text.includes("technology") || text.includes("system") || text.includes("software") || text.includes("solutions")) return "服务/技术";
  return "品牌/制造商";
}

function inferIntent(type, product) {
  if (type === "经销/贸易商") return "优先询问代理、库存和当地渠道";
  if (type === "行业协会/媒体") return "适合获取行业名单和展会曝光";
  if (type === "教育/展会") return "适合报名参展、查找参展商目录";
  if (type === "服务/技术") return "适合找技术合作、系统或设备方案";
  if (product === "正畸与矫治") return "适合正畸产品、耗材和方案合作";
  return "适合建立品牌供应或采购关系";
}

function scoreLead(country, product, type, index) {
  let score = 62 + ((index * 7) % 24);
  if (["United States of America", "Germany", "United Kingdom", "Singapore"].includes(country)) score += 8;
  if (["牙科耗材与设备", "医疗器械与耗材"].includes(product)) score += 5;
  if (type === "经销/贸易商") score += 4;
  return Math.min(score, 98);
}

function bindEvents() {
  els.keyword.addEventListener("input", () => {
    state.keyword = els.keyword.value.trim();
    render();
  });

  [
    [els.country, "country"],
    [els.region, "region"],
    [els.market, "market"],
    [els.product, "product"]
  ].forEach(([element, key]) => {
    element.addEventListener("change", () => {
      state[key] = element.value;
      render();
    });
  });

  els.favoritesOnly.addEventListener("change", () => {
    state.favoritesOnly = els.favoritesOnly.checked;
    render();
  });

  els.typeTabs.addEventListener("click", (event) => {
    const button = event.target.closest("[data-type]");
    if (!button) return;
    state.type = button.dataset.type;
    renderTypeTabs();
    render();
  });

  document.querySelectorAll(".view-button").forEach((button) => {
    button.addEventListener("click", () => {
      state.view = button.dataset.view;
      document.querySelectorAll(".view-button").forEach((item) => item.classList.toggle("active", item === button));
      render();
    });
  });

  els.results.addEventListener("click", (event) => {
    const action = event.target.closest("[data-action]");
    if (!action) return;
    const customer = customers.find((item) => item.id === action.dataset.id);
    if (!customer) return;

    if (action.dataset.action === "detail") selectCustomer(customer.id);
    if (action.dataset.action === "favorite") toggleFavorite(customer.id);
  });

  els.detailContent.addEventListener("click", (event) => {
    const copyButton = event.target.closest("[data-copy]");
    if (copyButton) copyText(copyButton.dataset.copy);
  });

  els.queryPills.addEventListener("click", (event) => {
    const copyButton = event.target.closest("[data-copy]");
    if (copyButton) copyText(copyButton.dataset.copy);
  });

  els.detailContent.addEventListener("input", persistDetailRecord);
  els.detailContent.addEventListener("change", persistDetailRecord);

  els.closeDetail.addEventListener("click", () => {
    state.selectedId = null;
    els.detailPanel.classList.remove("open");
    renderDetail();
  });

  els.exportBtn.addEventListener("click", () => exportCSV(getFilteredCustomers()));
  els.resetBtn.addEventListener("click", resetFilters);

}

function render() {
  const filtered = getFilteredCustomers();
  renderMetrics(filtered);
  renderQueryPills(filtered);
  renderActiveFilters(filtered);

  els.emptyState.hidden = filtered.length > 0;
  els.results.innerHTML = state.view === "table" ? renderTable(filtered) : filtered.map(renderCard).join("");
  els.results.className = state.view === "table" ? "table-wrap" : "results-grid";
}

function getFilteredCustomers() {
  const words = state.keyword.toLowerCase().split(/\s+/).filter(Boolean);
  return customers.filter((customer) => {
    const record = records[customer.id] || {};
    const haystack = [
      customer.name,
      customer.country,
      customer.region,
      customer.market,
      customer.product,
      customer.type,
      customer.intent,
      customer.industryGroup,
      customer.cardIndustry,
      customer.contactName,
      customer.position,
      customer.contactInfo,
      customer.website,
      customer.address,
      record.status,
      record.note
    ].join(" ").toLowerCase();

    return (
      words.every((word) => haystack.includes(word)) &&
      matchAll(state.country, customer.country) &&
      matchAll(state.region, customer.region) &&
      matchAll(state.market, customer.market) &&
      matchAll(state.product, customer.product) &&
      matchAll(state.type, customer.type) &&
      (!state.favoritesOnly || favorites.has(customer.id))
    );
  });
}

function renderMetrics(filtered) {
  els.resultCount.textContent = filtered.length;

      <p class="network-note">这些入口会打开外部实时网页，用于查官网、公司联系方式、新闻、股票和财报。后续接 API 后，可以把结果直接写回客户库。</p>
    </section>

    <section class="detail-section">
      <h4>股票与财报</h4>
      <div class="finance-panel">
        <strong>${customer.ticker ? `疑似上市代码：${escapeHTML(customer.ticker)}` : "未确认上市代码"}</strong>
        <span class="network-note">不是所有客户都是上市公司；私营公司通常需要通过官网、年报搜索、当地工商信息或新闻交叉验证。</span>
        <div class="link-row">
          <a class="text-button" href="${customer.links.finance}" target="_blank" rel="noopener">股票搜索</a>
          <a class="text-button" href="${customer.links.reports}" target="_blank" rel="noopener">年报搜索</a>
          <a class="text-button" href="${customer.links.sec}" target="_blank" rel="noopener">SEC/EDGAR</a>
          <a class="text-button" href="${customer.links.investor}" target="_blank" rel="noopener">投资者关系</a>
        </div>
      </div>
    </section>

    <section class="detail-section">
      <h4>跟进管理</h4>
      <label class="field">
        <span>状态</span>
        <select data-record-field="status" data-id="${customer.id}">
          ${["待开发", "已收藏", "已查官网", "已找到邮箱", "已发开发信", "暂不匹配"].map((status) => `
            <option value="${status}" ${status === (record.status || "待开发") ? "selected" : ""}>${status}</option>
          `).join("")}
        </select>
      </label>
      <label class="field">
        <span>备注</span>
        <textarea data-record-field="note" data-id="${customer.id}" placeholder="记录官网、联系人、邮箱、开发信反馈">${escapeHTML(record.note || "")}</textarea>
      </label>
    </section>

    <section class="detail-section">
      <h4>搜索词</h4>
      <div class="copy-list">
        ${searchQueries.map((query) => `
          <div class="copy-item">
            <code>${escapeHTML(query)}</code>
            <button class="icon-button" type="button" data-copy="${escapeAttr(query)}" title="复制搜索词">
              <svg><use href="#icon-copy"></use></svg>
            </button>
          </div>
        `).join("")}
      </div>
    </section>
  `;
}

function renderCardSourceSection(customer) {
  const rows = [
    ["联系人", customer.contactName],
    ["职位", customer.position],
    ["联系方式", customer.contactInfo],
    ["官网 / 社媒", customer.website],
    ["公司地址", customer.address],
    ["行业分组", customer.industryGroup],
    ["细分行业", customer.cardIndustry],
    ["资源来源", customer.source]
  ].filter(([, value]) => value);

  if (!rows.length) return "";

  return `
    <section class="detail-section card-source-section">
      <h4>名片资源信息</h4>
      <div class="source-grid">
        ${rows.map(([label, value]) => `
          <div class="source-row">
            <span>${escapeHTML(label)}</span>
            <strong>${renderMultiline(value)}</strong>
          </div>
        `).join("")}
      </div>
    </section>
  `;
}

function renderMultiline(value) {
  return escapeHTML(value).replace(/\n/g, "<br>");
}

function renderTypeTabs() {
  els.typeTabs.innerHTML = typeOptions.map((type) => `
    <button class="segment-button ${state.type === type ? "active" : ""}" type="button" data-type="${type}" role="tab" aria-selected="${state.type === type}">
      ${type}
    </button>
  `).join("");
}

function selectCustomer(id) {
  state.selectedId = id;
  els.detailPanel.classList.add("open");
  renderDetail();
}

function toggleFavorite(id) {
  if (favorites.has(id)) favorites.delete(id);
  else favorites.add(id);
  localStorage.setItem(storageKeys.favorites, JSON.stringify([...favorites]));
  render();
  if (state.selectedId === id) renderDetail();
}

function persistDetailRecord(event) {
  const field = event.target.dataset.recordField;
  const id = event.target.dataset.id;
  if (!field || !id) return;
  records[id] = { ...(records[id] || {}), [field]: event.target.value };
  localStorage.setItem(storageKeys.records, JSON.stringify(records));
  render();
}

function resetFilters() {
  state.keyword = "";
  state.country = "全部";
  state.region = "全部";
  state.market = "全部";
  state.product = "全部";
  state.type = "全部";
  state.favoritesOnly = false;
  els.keyword.value = "";
  els.country.value = "全部";
  els.region.value = "全部";
  els.market.value = "全部";
  els.product.value = "全部";
  els.favoritesOnly.checked = false;
  renderTypeTabs();
  render();
}

function setOptions(select, values) {
  select.innerHTML = ["全部", ...values].map((value) => `<option value="${escapeAttr(value)}">${escapeHTML(value)}</option>`).join("");
}

function matchAll(filterValue, actualValue) {
  return filterValue === "全部" || filterValue === actualValue;
}

function unique(values) {
  return [...new Set(values.filter(Boolean))].sort((a, b) => a.localeCompare(b, "zh-CN"));
}

function readJSON(key, fallback) {
  try {
    return JSON.parse(localStorage.getItem(key)) || fallback;
  } catch {
    return fallback;
  }
}

function exportCSV(rows) {
  const header = ["客户名称", "国家", "地区", "外贸目的地", "产品方向", "客户类型", "匹配度", "联系人", "职位", "联系方式", "官网/社媒", "公司地址", "行业分组", "细分行业", "官网搜索", "股票/财报入口", "状态", "备注"];
  const body = rows.map((customer) => {
    const record = records[customer.id] || {};
    return [
      customer.name,
      customer.country,
      customer.region,
      customer.market,
      customer.product,
      customer.type,
      `${customer.score}%`,
      customer.contactName || "",
      customer.position || "",
      customer.contactInfo || "",
      customer.website || "",
      customer.address || "",
      customer.industryGroup || "",
      customer.cardIndustry || "",
      customer.links.official,
      customer.links.investor,
      record.status || "待开发",
      record.note || ""
    ];
  });
  const csv = [header, ...body].map((row) => row.map(csvEscape).join(",")).join("\n");
  const blob = new Blob([`\ufeff${csv}`], { type: "text/csv;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.href = url;
  link.download = `shuoyi-customers-${new Date().toISOString().slice(0, 10)}.csv`;
  link.click();
  URL.revokeObjectURL(url);
}

function csvEscape(value) {
  const text = String(value ?? "");
  if (/[",\n]/.test(text)) return `"${text.replace(/"/g, '""')}"`;
  return text;
}

async function copyText(text) {
  try {
    await navigator.clipboard.writeText(text);
    showToast("搜索词已复制");
  } catch {
    const input = document.createElement("textarea");
    input.value = text;
    document.body.appendChild(input);
    input.select();
    document.execCommand("copy");
    input.remove();
    showToast("搜索词已复制");
  }
}

function showToast(message) {
  const toast = document.createElement("div");
  toast.className = "toast";
  toast.textContent = message;
  document.body.appendChild(toast);
  window.setTimeout(() => toast.remove(), 1800);
}

function escapeHTML(value) {
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function escapeAttr(value) {
  return escapeHTML(value);
}

    </script>
  </body>
</html>
